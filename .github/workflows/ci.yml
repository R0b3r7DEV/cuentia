name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend (PHP · PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, mbstring, pdo_pgsql, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run unit tests
        run: php bin/phpunit

  # Guards the class of bug where an entity changes but its migration is missing: run every migration
  # against a real PostgreSQL, then assert the resulting schema matches the entity mapping.
  # ES: Protege contra el fallo de cambiar una entidad y olvidar su migración: ejecuta todas las
  # migraciones sobre un PostgreSQL real y comprueba que el esquema coincide con las entidades.
  migrations:
    name: Migrations (schema in sync)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cuentia
          POSTGRES_PASSWORD: cuentia
          POSTGRES_DB: cuentia
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://cuentia:cuentia@127.0.0.1:5432/cuentia?serverVersion=17&charset=utf8
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, mbstring, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run all migrations from scratch
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Fail if the schema drifted from the entities
        run: php bin/console doctrine:schema:validate

  frontend:
    name: Frontend (Node · test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # The pure geometry — polygon area, ray casting and the plan-de-skew homography — is unit-tested.
      # ES: La geometría pura (área de polígonos, lanzamiento de rayos y la homografía) está testeada.
      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
